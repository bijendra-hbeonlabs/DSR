name: Deploy Employee Management System

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "✨ Connected to server. Deploying latest changes..."
            
            # Navigate to the project directory
            cd /var/www/employee-management-system || exit 1
            
            # Pull latest changes from git
            git pull origin main
            
            # Install dependencies
            pnpm install
            
            # Build the Next.js frontend
            pnpm build
            
            # Restart client and backend processes gracefully using PM2
            if command -v pm2 &> /dev/null; then
              pm2 restart ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
              pm2 save
            else
              echo "⚠️ PM2 not found. Restarting backend server and next client manually..."
              pnpm stop
              pnpm start
            fi
            
            echo "🚀 Deployment successfully completed!"
