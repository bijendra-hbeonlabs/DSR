<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>
  <g transform="translate(10, 15)">
    <!-- HBE text -->
    <text x="0" y="32" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="34" fill="#0e60a9" letter-spacing="1.5">HBE</text>
    
    <!-- Globe for 'O' -->
    <g transform="translate(94, 21)">
      <!-- Ring backing -->
      <ellipse cx="0" cy="0" rx="20" ry="6" fill="none" stroke="#0e60a9" stroke-width="2.5" transform="rotate(-15)" opacity="0.6"/>
      <!-- The globe sphere -->
      <circle cx="0" cy="0" r="13" fill="url(#globeGrad)" />
      <!-- Globe continents design overlay -->
      <path d="M -9 -4 C -6 -9, 0 -7, 2 -11 C 5 -9, 7 -4, 10 -5 C 11 0, 6 4, 9 8 C 4 10, -2 9, -4 5 Z" fill="#22c55e" opacity="0.65" />
      <!-- Front part of the ring -->
      <path d="M -19 5 C -13 9, 13 6, 19 -5" fill="none" stroke="#0e60a9" stroke-width="3.2" transform="rotate(-15)" />
    </g>
    
    <!-- NLABS text -->
    <text x="123" y="32" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="34" fill="#0e60a9" letter-spacing="1.5">NLABS</text>
    
    <!-- Subtitle: Technologies Pvt. Ltd. -->
    <text x="2" y="49" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="10.5" fill="#475569" letter-spacing="3.1">Technologies Pvt. Ltd.</text>
  </g>
</svg>
